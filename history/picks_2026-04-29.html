<script>
var ML_DATA    = [{"away": "PIT", "home": "PHI", "pick": "PHI", "conf": 60.7, "result": "W", "score": "0-1", "ou_pick": "Over", "ou_line": 5.5, "ou_conf": 84.3, "ou_result": "L", "total": 1}, {"away": "MTL", "home": "TBL", "pick": "TBL", "conf": 68.4, "result": "L", "score": "3-2", "ou_pick": "Over", "ou_line": 5.5, "ou_conf": 78.9, "ou_result": "L", "total": 5}, {"away": "UTA", "home": "VGK", "pick": "VGK", "conf": 59.6, "result": "W", "score": "4-5", "ou_pick": "Over", "ou_line": 5.5, "ou_conf": 95.0, "ou_result": "W", "total": 9}];
var PROPS_RECORD_HTML = "\n<div style=\"background:#f9fafb;border-radius:12px;border:0.5px solid #e5e7eb;padding:16px 18px;margin-bottom:20px;\">\n  <div style=\"font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:12px;\">Props Record</div>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;\">\n    <div style=\"text-align:center;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">All time</div>\n      <div style=\"font-size:22px;font-weight:500;color:#111;\">73-83</div>\n      <div style=\"font-size:11px;color:#dc2626;\">46.8%</div></div>\n    <div style=\"text-align:center;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">This month</div>\n      <div style=\"font-size:22px;font-weight:500;color:#111;\">0-0</div></div>\n    <div style=\"text-align:center;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">Yesterday</div>\n      <div style=\"font-size:22px;font-weight:500;color:#111;\">0-0</div></div>\n    <div style=\"text-align:center;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">Today</div>\n      <div style=\"font-size:22px;font-weight:500;color:#111;\">0</div></div>\n  </div>\n  <div style=\"height:5px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:4px;\">\n    <div style=\"width:46.8%;height:100%;background:#16a34a;border-radius:99px;\"></div></div>\n  <div style=\"display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;margin-bottom:14px;\">\n    <span>Hit rate</span><span>Break-even ~52%</span></div>\n  <div style=\"font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:8px;\">Record by confidence</div>\n  <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:6px;\"><div style=\"background:#fff;border-radius:8px;padding:10px 6px;text-align:center;border:0.5px solid #e5e7eb;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">50-55%</div><div style=\"font-size:13px;font-weight:500;\">27-52</div><div style=\"font-size:10px;color:#dc2626;margin-top:1px;\">34%</div></div><div style=\"background:#fff;border-radius:8px;padding:10px 6px;text-align:center;border:0.5px solid #e5e7eb;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">55-60%</div><div style=\"font-size:13px;font-weight:500;\">11-12</div><div style=\"font-size:10px;color:#dc2626;margin-top:1px;\">48%</div></div><div style=\"background:#fff;border-radius:8px;padding:10px 6px;text-align:center;border:0.5px solid #e5e7eb;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">60-65%</div><div style=\"font-size:13px;font-weight:500;\">11-10</div><div style=\"font-size:10px;color:#dc2626;margin-top:1px;\">52%</div></div><div style=\"background:#fff;border-radius:8px;padding:10px 6px;text-align:center;border:0.5px solid #e5e7eb;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">65-70%</div><div style=\"font-size:13px;font-weight:500;\">13-5</div><div style=\"font-size:10px;color:#16a34a;margin-top:1px;\">72%</div></div><div style=\"background:#fff;border-radius:8px;padding:10px 6px;text-align:center;border:0.5px solid #e5e7eb;\"><div style=\"font-size:10px;color:#9ca3af;margin-bottom:3px;\">70%+</div><div style=\"font-size:13px;font-weight:500;\">11-4</div><div style=\"font-size:10px;color:#16a34a;margin-top:1px;\">73%</div></div></div>\n</div>";
var PROP_DATA  = [];
var currentTab = 'ml';

function badge(r){
  if(r==='W') return '<span class="badge win">W</span>';
  if(r==='L') return '<span class="badge loss">L</span>';
  return '<span class="badge pending">–</span>';
}

function showTab(t){
  if(t==='props'){
    var rec = document.getElementById('props-record-box');
    if(rec && PROPS_RECORD_HTML) rec.innerHTML = PROPS_RECORD_HTML;
  }
  currentTab = t;
  ['ml','ou','props'].forEach(function(x){
    document.getElementById('view-'+x).style.display = x===t?'block':'none';
    var b = document.getElementById('tab-'+x);
    b.style.background = x===t?'#111':'#f3f4f6';
    b.style.color      = x===t?'#fff':'#374151';
  });
}

function renderML(){
  var html = '';
  ML_DATA.forEach(function(p){
    html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;">'
      + '<div><div style="font-size:13px;color:#9ca3af;margin-bottom:2px;">'+p.away+' @ '+p.home+'</div>'
      + '<div style="font-size:16px;font-weight:500;">Pick: '+p.pick+'</div>'
      + '<div style="font-size:12px;color:#9ca3af;margin-top:3px;">'+p.conf.toFixed(0)+'% confidence</div></div>'
      + '<div style="text-align:right;">'+badge(p.result)
      + '<div style="font-size:12px;color:#9ca3af;margin-top:6px;">'+p.score+'</div></div>'
      + '</div></div>';
  });
  document.getElementById('view-ml').innerHTML = html || '<div style="color:#9ca3af;padding:20px 0;">No picks.</div>';
}

function renderOU(){
  var html = '';
  ML_DATA.forEach(function(p){
    html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;">'
      + '<div><div style="font-size:13px;color:#9ca3af;margin-bottom:2px;">'+p.away+' @ '+p.home+'</div>'
      + '<div style="font-size:16px;font-weight:500;">'+p.ou_pick+' '+p.ou_line+'</div>'
      + '<div style="font-size:12px;color:#9ca3af;margin-top:3px;">'+p.ou_conf.toFixed(0)+'% confidence</div></div>'
      + '<div style="text-align:right;">'+badge(p.ou_result)
      + '<div style="font-size:12px;color:#9ca3af;margin-top:6px;">Total: '+p.total+'</div></div>'
      + '</div></div>';
  });
  document.getElementById('view-ou').innerHTML = html || '<div style="color:#9ca3af;padding:20px 0;">No picks.</div>';
}

function renderProps(){
  if(!PROP_DATA.length){
    document.getElementById('view-props').innerHTML = '<div style="color:#9ca3af;padding:20px 0;">No props saved for this day.</div>';
    return;
  }
  var sorted = PROP_DATA.slice().sort(function(a,b){return b.conf-a.conf;});
  var html = '';
  sorted.forEach(function(p){
    var confCol = p.conf>=65?'#15803d':p.conf>=60?'#16a34a':p.conf>=55?'#d97706':'#374151';
    var mkt = p.market.replace('player_','').replace(/_/g,' ');
    html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;">'
      + '<div><div style="font-size:14px;font-weight:500;">'+p.player+'</div>'
      + '<div style="font-size:11px;color:#9ca3af;margin-top:2px;">'+mkt+'</div></div>'
      + '<div style="text-align:right;"><div style="font-size:14px;font-weight:600;">'+p.pick+'</div>'
      + '<div style="font-size:11px;font-weight:500;color:'+confCol+';">'+p.conf.toFixed(0)+'% conf</div>'
      + badge(p.result)
      + (p.actual!==undefined&&p.actual!=='–'?'<div style="font-size:11px;color:#9ca3af;">actual: '+p.actual+'</div>':'')
      + '</div></div></div>';
  });
  document.getElementById('view-props').innerHTML = html;
}

renderML(); renderOU(); renderProps();
</script>
